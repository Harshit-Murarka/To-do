<!DOCTYPE html>
<html lang="en">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <h1>Kanban Board</h1>
    <div id="container">
        <div class="column" id="todo-column">

            <h2>To Do</h2>

            <div class="card">Learn HTML</div>
            <div class="card">Make a Web-Dev</div>
            <div class="card">Complete CW</div>

        </div>

        <div class="column" id="ongoing-column">

            <h2>In Progress</h2>

            <div class="card">Learn Java</div>

        </div>

        <div class="column" id="done-column">

            <h2>Done</h2>

            <div class="card">Learn Python</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
