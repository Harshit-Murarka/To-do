<!DOCTYPE html>
<html lang="en">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <h1>Kanban Board</h1>
    <div id="container">
        <div class="column" id="todo-column">

            <h2>To Do</h2>

            <input class="task-input"  id="todo-input" type="text" placeholder="Enter Task...">
            <button class="add-btn" id="todo-add-btn">Add Task</button>

            <div class="card" draggable="true">
                <span class="card-text">Learn HTML</span>
                <button class="delete-btn">X</button>
            </div>
            <div class="card" draggable="true">
                <span class="card-text">Make a Web-Dev</span>
                <button class="delete-btn">X</button>
            </div>
            <div class="card" draggable="true">
                <span class="card-text">Complete CW</span>
                <button class="delete-btn">X</button>
            </div>
            
        </div>

        <div class="column" id="ongoing-column">

            <h2>In Progress</h2>

            <input class="task-input"  id="ongoing-input" type="text" placeholder="Enter Task...">
            <button class="add-btn" id="ongoing-add-btn">Add Task</button>

            <div class="card" draggable="true">
                <span class="card-text">Learn Java</span>
                <button class="delete-btn">X</button>
            </div>

        </div>

        <div class="column" id="done-column">

            <h2>Done</h2>

            <input class="task-input"  id="done-input" type="text" placeholder="Enter Task...">
            <button class="add-btn" id="done-add-btn">Add Task</button>

            <div class="card" draggable="true">
                <span class="card-text">Learn Python</span>
                <button class="delete-btn">X</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
